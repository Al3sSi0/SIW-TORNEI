<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Calendario Partite - SIW Tornei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">⚽ SIW Tornei</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="/squadre">Squadre</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Area Admin</a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/torneo/nuovo">Nuovo Torneo</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/squadra/nuova">Nuova Squadra</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/giocatore/nuovo">Nuovo Giocatore</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="/logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-primary mb-4">Calendario e Risultati</h1>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover m-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Data</th>
                            <th>Squadra Casa</th>
                            <th class="text-center">Risultato</th>
                            <th>Squadra Trasferta</th>
                            <th sec:authorize="hasAuthority('ADMIN')" class="text-end">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${partite}" class="align-middle">
                            <td th:text="${p.dataEOra}"></td>
                            <td th:text="${p.squadraHome?.nome}"></td>
                            <td class="text-center fw-bold fs-5 text-primary">
                                <span th:if="${p.goalsHome != null}"
                                    th:text="${p.goalsHome} + ' - ' + ${p.goalsAway}"></span>
                                <span th:unless="${p.goalsHome != null}" class="badge bg-secondary">Da Giocare</span>
                            </td>
                            <td th:text="${p.squadraAway?.nome}"></td>
                            <td sec:authorize="hasAuthority('ADMIN')" class="text-end">
                                <a th:href="@{'/admin/partita/risultato/' + ${p.id}}"
                                    class="btn btn-sm btn-outline-primary">Aggiorna Risultato</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(partite)}">
                            <td colspan="5" class="text-center py-4 text-muted">Nessuna partita in programma.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
