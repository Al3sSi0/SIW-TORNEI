<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Nuovo Giocatore</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">⚽ SIW Tornei</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="/squadre">Squadre</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Area Riservata</a>
                        <ul class="dropdown-menu">
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/torneo/nuovo">Nuovo Torneo</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/squadra/nuova">Nuova Squadra</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/giocatore/nuovo">Nuovo Giocatore</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="/logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <h1>Inserisci nuovo Giocatore</h1>

    <form th:action="@{/admin/giocatore}" th:object="${giocatore}" method="post">
        <div>
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" required />
        </div>
        <div>
            <label>Cognome:</label>
            <input type="text" th:field="*{cognome}" required />
        </div>
        <div>
            <label>Data di Nascita:</label>
            <input type="date" th:field="*{dataDiNascita}" required />
        </div>
        <div>
            <label>Ruolo:</label>
            <input type="text" th:field="*{ruolo}" />
        </div>
        <div>
            <label>Altezza (es. 1.80):</label>
            <input type="number" step="0.01" th:field="*{altezza}" />
        </div>
        <div>
            <label>Squadra:</label>
            <select th:field="*{squadra}">
                <option th:each="squadra : ${squadre}" th:value="${squadra.id}" th:text="${squadra.nome}"></option>
            </select>
        </div>
        <button type="submit">Salva Giocatore</button>
    </form>
</body>

</html>
