<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">⚽ SIW Tornei</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="/squadre">Squadre</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Area Riservata</a>
                        <ul class="dropdown-menu">
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/torneo/nuovo">Nuovo Torneo</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/squadra/nuova">Nuova Squadra</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/giocatore/nuovo">Nuovo Giocatore</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="/logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <h1>Inserisci Risultato: <span th:text="${partita.squadraHome.nome} + ' vs ' + ${partita.squadraAway.nome}"></span>
    </h1>

    <form th:action="@{'/admin/partita/risultato/' + ${partita.id}}" method="post">
        <div>
            <label>Gol Casa:</label>
            <input type="number" name="golHome" required />
        </div>
        <div>
            <label>Gol Trasferta:</label>
            <input type="number" name="golAway" required />
        </div>
        <button type="submit">Salva Risultato</button>
    </form>
</body>

</html>
