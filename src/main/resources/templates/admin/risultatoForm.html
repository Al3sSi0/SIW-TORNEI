<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Inserisci Risultato - SIW Tornei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">⚽Tornei Calcistici Roma Tre</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="/squadre">Squadre</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Area Riservata</a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/torneo/nuovo">Nuovo Torneo</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/squadra/nuova">Nuova Squadra</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/giocatore/nuovo">Nuovo Giocatore</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3 class="mb-0">Aggiorna Risultato</h3>
                    </div>

                    <div class="card-body p-4 p-md-5 text-center">

                        <h4 class="mb-5 text-secondary">
                            <span class="text-dark fw-bold" th:text="${partita.squadraHome.nome}">Squadra Casa</span>
                            <span class="mx-3 text-muted small">VS</span>
                            <span class="text-dark fw-bold" th:text="${partita.squadraAway.nome}">Squadra
                                Trasferta</span>
                        </h4>

                        <form th:action="@{'/admin/partita/risultato/' + ${partita.id}}" method="post">

                            <div class="row justify-content-center align-items-center mb-5">

                                <div class="col-4">
                                    <label class="form-label fw-bold text-secondary">Gol Casa</label>
                                    <input type="number" class="form-control form-control-lg text-center fs-3"
                                        name="golHome" required min="0" placeholder="0" />
                                </div>

                                <div class="col-2 fs-1 fw-bold text-muted mt-4">
                                    -
                                </div>

                                <div class="col-4">
                                    <label class="form-label fw-bold text-secondary">Gol Trasferta</label>
                                    <input type="number" class="form-control form-control-lg text-center fs-3"
                                        name="golAway" required min="0" placeholder="0" />
                                </div>

                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg fw-bold">Salva Risultato</button>
                                <a href="/partite" class="btn btn-outline-secondary">Annulla e Torna al Calendario</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
