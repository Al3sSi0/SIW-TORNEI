<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Nuova Squadra - Tornei Calcistici Roma Tre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">⚽Tornei Calcistici Roma Tre</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="/squadre">Squadre</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Area Riservata</a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/torneo/nuovo">Nuovo Torneo</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/squadra/nuova">Nuova Squadra</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/giocatore/nuovo">Nuovo Giocatore</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3 class="mb-0">Inserisci Nuova Squadra</h3>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/admin/squadra}" th:object="${squadra}" method="post">

                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Nome Squadra <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" th:field="*{nome}" required
                                    placeholder="es. Real Madrid" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Anno di Fondazione</label>
                                <input type="number" class="form-control form-control-lg" th:field="*{annoDiFondazione}"
                                    placeholder="es. 1902" min="1800" max="2030" />
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Città</label>
                                <input type="text" class="form-control form-control-lg" th:field="*{citta}"
                                    placeholder="es. Madrid" />
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold">Salva Squadra</button>
                                <a href="/squadre" class="btn btn-outline-secondary">Annulla e Torna all'elenco</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
