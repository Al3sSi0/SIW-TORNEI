<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Login - SIW Tornei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">⚽Tornei Calcistici Roma Tre</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="/squadre">Squadre</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link active" href="/login">Login</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Area Riservata</a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/torneo/nuovo">Nuovo Torneo</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/squadra/nuova">Nuova Squadra</a></li>
                            <li sec:authorize="hasAuthority('ADMIN')"><a class="dropdown-item"
                                    href="/admin/giocatore/nuovo">Nuovo Giocatore</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow border-0 rounded-3 mt-4">
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h3 class="mb-0">Accesso Area Admin</h3>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <div th:if="${param.error}" class="alert alert-danger text-center shadow-sm" role="alert">
                            ⚠️ Credenziali non valide. Riprova.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success text-center shadow-sm" role="alert">
                            ✅ Disconnessione effettuata con successo.
                        </div>

                        <form th:action="@{/login}" method="POST">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Username</label>
                                <input type="text" name="username" class="form-control form-control-lg" required
                                    placeholder="Inserisci username" autofocus />
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" required
                                    placeholder="Inserisci password" />
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold">Entra</button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
