<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title th:text="${squadra.nome} + ' - Dettagli'">Dettagli Squadra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">⚽ Tornei Calcistici Roma Tre</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tornei">Tornei</a></li>
                    <li class="nav-item"><a class="nav-link" href="/partite">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/squadre">Squadre</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mb-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary mb-0">
                <span th:text="${squadra.nome}">Nome Squadra</span>
            </h2>
            <a href="/squadre" class="btn btn-outline-secondary fw-bold shadow-sm">
                ⬅ Torna alla lista
            </a>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0">Informazioni Club</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <span class="text-muted">Città</span>
                                <strong th:text="${squadra.citta != null ? squadra.citta : 'N/D'}">Roma</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <span class="text-muted">Fondazione</span>
                                <strong
                                    th:text="${squadra.annoDiFondazione != null ? squadra.annoDiFondazione : 'N/D'}">1927</strong>
                            </li>
                        </ul>

                        <div class="d-grid mt-4" sec:authorize="hasAuthority('ADMIN')">
                            <a th:href="@{/admin/squadra/modifica/{id}(id=${squadra.id})}"
                                class="btn btn-warning btn-sm fw-bold">✏️ Modifica Squadra</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">Rosa Giocatori</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="py-3 px-4">Nome Giocatore</th>
                                        <th class="py-3 px-4">Ruolo</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="giocatore : ${squadra.giocatori}">
                                        <td class="fw-bold px-4"
                                            th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">Mario Rossi</td>
                                        <td class="text-muted px-4" th:text="${giocatore.ruolo}">Attaccante</td>
                                    </tr>

                                    <tr th:if="${#lists.isEmpty(squadra.giocatori)}">
                                        <td colspan="2" class="text-center py-5 text-muted">
                                            <p class="mb-0">Nessun giocatore registrato per questa squadra.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
